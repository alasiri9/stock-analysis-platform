<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ماسح الأسهم الأمريكية الذكي{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20260629x">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img src="{{ url_for('static', filename='logo.png') }}?v=1" alt="Algomatix" class="brand-logo">
      </div>
      <nav class="nav">
        <a href="{{ url_for('index') }}"><span class="ic">📊</span> الرئيسية</a>
        <a href="#"><span class="ic">🚀</span> القادة المستقبليون</a>
        <a href="#"><span class="ic">💎</span> الجواهر المخفية</a>
        <a href="#"><span class="ic">🎯</span> رادار المحفزات</a>
        <a href="#"><span class="ic">📡</span> التدقّق الذكي</a>
        <a href="#"><span class="ic">🧠</span> المحفظة الذكية</a>
        <a href="#"><span class="ic">⚡</span> إشارات التداول</a>
        <a href="{{ url_for('index') }}" class="{{ 'active' if active=='home' else '' }}"><span class="ic">🔍</span> ماسح الانطلاق</a>
        <a href="#"><span class="ic">📅</span> التقرير اليومي</a>
        <a href="{{ url_for('compare') }}" class="{{ 'active' if active=='compare' else '' }}"><span class="ic">⚖️</span> مقارنة أسهم</a>
        <a href="#"><span class="ic">📰</span> أخبار السوق</a>
        <a href="#"><span class="ic">📈</span> اختيار الأداء</a>
        <a href="{{ url_for('watchlist') }}" class="{{ 'active' if active=='watchlist' else '' }}"><span class="ic">👁</span> قائمة المراقبة</a>
      </nav>
      <a href="#" class="nav-logout"><span class="ic">🚪</span> خروج</a>
      <div class="sidebar-foot">
        <small>ماسح الأسهم الأمريكية الذكي © 2026</small>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
