<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}منصة تحليل الأسهم{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">منصة التحليل<small>أداة فحص تعليمية — لا توصيات</small></div>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{{ 'active' if active=='home' else '' }}">🏠 الرئيسية (Screener)</a>
        <a href="{{ url_for('watchlist') }}" class="{{ 'active' if active=='watchlist' else '' }}">⭐ قائمة المتابعة</a>
        <a href="{{ url_for('compare') }}" class="{{ 'active' if active=='compare' else '' }}">⚖️ مقارنة أسهم</a>
      </nav>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
