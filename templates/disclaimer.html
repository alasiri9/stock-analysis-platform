<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تنبيه ومسؤولية — Algomatix</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
  <script>(function(){try{if(localStorage.getItem('theme')==='light'){document.documentElement.classList.add('light');}}catch(e){}})();</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20260714f">
  <style>
    .disc-overlay {
      position: fixed; inset: 0; background: rgba(4, 10, 24, .92);
      display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 9999;
    }
    .disc-box {
      background: var(--card, #0d1830); border: 1px solid var(--border, #22345c);
      border-radius: 16px; max-width: 560px; width: 100%; padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
    }
    .disc-box h1 { font-size: 22px; margin: 0 0 16px; color: var(--gold, #f5c451); text-align: center; }
    .disc-text { font-size: 16px; line-height: 1.95; color: var(--text, #e8eefc); margin: 0 0 22px; }
    .disc-check {
      display: flex; align-items: center; gap: 10px; margin: 0 0 22px;
      cursor: pointer; font-size: 16px; color: var(--text, #e8eefc); user-select: none;
    }
    .disc-check input {
      appearance: none; -webkit-appearance: none; width: 22px; height: 22px;
      border: 2px solid var(--muted, #8aa0c0); border-radius: 50%; cursor: pointer;
      flex: 0 0 auto; position: relative; margin: 0;
    }
    .disc-check input:checked { border-color: var(--green, #22c55e); background: var(--green, #22c55e); }
    .disc-check input:checked::after {
      content: '✓'; color: #fff; font-size: 14px; font-weight: 900;
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    .disc-actions { display: flex; gap: 14px; }
    .disc-actions button, .disc-actions a {
      flex: 1; font-weight: 900; padding: 13px; border-radius: 12px; font-size: 18px;
      cursor: pointer; text-align: center; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }
    .disc-actions .agree {
      background: rgba(34, 197, 94, .15); color: var(--green, #22c55e); border: 1px solid rgba(34, 197, 94, .45);
    }
    .disc-actions .agree:disabled { opacity: .4; cursor: not-allowed; }
    .disc-actions .reject {
      background: transparent; color: var(--red, #ef4444); border: 1px solid rgba(239, 68, 68, .45);
    }
  </style>
</head>
<body>
  <div class="disc-overlay">
    <div class="disc-box">
      <h1>⚠️ تنبيه وإخلاء مسؤولية</h1>
      <p class="disc-text">
        المنصة تعمل على مؤشرات واستراتيجيات عالمية وكثيرة مدمجة، وكل ما يصدر منها
        لا يُؤخذ على أنه توصية بيع أو شراء، وإنما هو تعليمي مساعد. وقرار الشراء أو البيع
        يخصّك وتتحمّل مسؤوليته، فأسواق المال تنطوي على مخاطر الخسارة.
      </p>
      <form method="post" action="{{ url_for('disclaimer_accept') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="disc-check">
          <input type="checkbox" name="agree" id="agree"
                 onchange="document.getElementById('agreeBtn').disabled = !this.checked">
          <span>قرأت التنبيه وفهمت</span>
        </label>
        <div class="disc-actions">
          <button class="agree" id="agreeBtn" type="submit" disabled>موافق</button>
          <a class="reject" href="{{ url_for('logout') }}">رفض</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
